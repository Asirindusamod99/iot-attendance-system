name: ESP32 CI/CD Pipeline

on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Compile ESP32 Firmware
      run: pio run 

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1 

    - name: Upload Firmware to AWS S3
      run: |
        aws s3 cp .pio/build/esp32dev/firmware.bin s3://asirindu-aetherflash-firmware-2026/firmware.bin --acl public-read

    - name: Trigger ESP32 OTA Update via AWS IoT
      run: |
        aws iot-data publish \
          --topic "aetherflash/device/Machine_01/ota" \
          --cli-binary-format raw-in-base64-out \
          --region us-east-1 \
          --payload "https://asirindu-aetherflash-firmware-2026.s3.ap-southeast-1.amazonaws.com/firmware.bin"